    if (categoryData) {
      // Update page title and description
      document.getElementById('category-title').textContent = categoryData.title;
      document.getElementById('category-description').textContent = categoryData.description;
      document.getElementById('breadcrumb-category').textContent = categoryData.title;
      document.title = categoryData.title + ' - The Crochet Sab';

      // Populate products
      const productsContainer = document.getElementById('category-products');
      categoryData.products.forEach(product => {
        const productHTML = `
          <div class="product">
            <div class="product-image">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="product-info">
              <h3>${product.name}</h3>
              <p class="product-description">${product.description}</p>
              <p class="price">${product.price}</p>
              <button class="buy-button" onclick="goToProduct('${product.name}')">View Details</button>
            </div>
          </div>
        `;
        productsContainer.innerHTML += productHTML;
      });
    } else {
      document.getElementById('category-products').innerHTML = '<p>Category not found. Please select a valid category.</p>';
    }

    function goToProduct(productName) {
      window.location.href = 'product-detail.html?product=' + productName.replace(/\s+/g, '-').toLowerCase();
    }

    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('nav a').forEach(link => {
      const href = link.getAttribute('href');
      if ((currentPage === '' && href === 'index.html') || currentPage === href) {
        link.classList.add('active');
      }
    });
